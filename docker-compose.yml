version: "3.8"

services:
  # Optional: Local LiveKit server for development
  # Use LiveKit Cloud for production
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"  # HTTP/WebSocket
      - "7881:7881"  # RTC/TCP
      - "50000-50100:50000-50100/udp"  # RTC/UDP
    environment:
      - LIVEKIT_KEYS=devkey:secret
    command: >
      --dev
      --bind 0.0.0.0
      --port 7880
